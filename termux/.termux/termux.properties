# =============================================================================
# termux.properties — Configuracion de Termux para Emacs Modular Config
# Desplegado via GNU Stow (stow -v -t ~ termux)
# =============================================================================

# Extra keys para Emacs:
# Fila 1: ESC, TAB, CTRL, ALT, F5 (compilar), F7 (treemacs), F12 (go-to-def)
# Fila 2: FN, pipe, LEFT, DOWN, UP, RIGHT, PGUP, PGDN
extra-keys = [['ESC','TAB','CTRL','ALT','F5','F7','F12','DEL'],['FN','|','LEFT','DOWN','UP','RIGHT','PGUP','PGDN']]

# Usar teclado de pantalla completa para mejor experiencia con Emacs
# fullscreen = true

# Input crudo y mapeo de "Atrás" a ESC para optimizar interacción en Emacs
enforce-char-based-input = true
back-key = escape

# Permitir acceso al almacenamiento externo
# (requiere ejecutar termux-setup-storage una vez)

# Bell: vibrar en vez de sonido
bell-character = vibrate

# Cursor: bloque parpadeante (consistente con Emacs)
terminal-cursor-style = block
terminal-cursor-blink-rate = 500
